# Log rotation for the Hyperliquid AI bot on EC2.
# Install: sudo cp deploy/aws/logrotate-atb.conf /etc/logrotate.d/atb
# (edit the path to match your install dir, e.g. /home/ubuntu/bot/logs)

/home/ubuntu/bot/logs/*.out
/home/ubuntu/bot/logs/*.err
/home/ubuntu/bot/logs/runtime.log
{
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
